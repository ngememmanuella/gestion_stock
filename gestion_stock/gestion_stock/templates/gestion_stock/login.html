<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPro — Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #1e1e2e;
            --accent: #f0c040;
            --text: #e8e8f0;
            --muted: #6b6b80;
            --danger: #e74c3c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Grille décorative en fond */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeUp 0.5s ease;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-header { text-align: center; margin-bottom: 40px; }
        .login-logo {
            font-family: 'Syne', sans-serif;
            font-size: 36px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
        }
        .login-logo em { color: var(--text); font-style: normal; }
        .login-sub {
            color: var(--muted);
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 36px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .field { margin-bottom: 20px; }
        .field label {
            display: block;
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        .field input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 14px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }
        .field input:focus { border-color: var(--accent); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0a0a0f;
            border: none;
            border-radius: 6px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-login:hover { opacity: 0.9; }
        .btn-login:active { transform: scale(0.98); }

        .alert-error {
            background: rgba(231,76,60,0.1);
            border: 1px solid rgba(231,76,60,0.3);
            border-left: 3px solid var(--danger);
            color: #ff8070;
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-header">
            <div class="login-logo">Stock<em>Pro</em></div>
            <div class="login-sub">Système de gestion des stocks</div>
        </div>

        <div class="login-card">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert-error">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="field">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" placeholder="ex: emmanuella" required autofocus>
                </div>
                <div class="field">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button class="btn-login" type="submit">Se connecter →</button>
            </form>
        </div>

        <div class="login-footer">StockPro v1.0 · Université de Yaoundé 1</div>
    </div>
</body>
</html>
